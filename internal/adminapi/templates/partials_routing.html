{{define "routing_section"}}
<div class="card">
  <div class="card__header"><strong>Routing</strong></div>
  <div class="card__body">
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Role</th><th>Slot (model)</th></tr>
        </thead>
        <tbody>
          {{range .Roles}}
          <tr>
            <td><code>{{.Name}}</code></td>
            <td>
              <form hx-post="/routing/{{.Name}}/set"
                    hx-target="#routing-section"
                    hx-swap="innerHTML"
                    style="display:inline-flex;gap:0.5rem;align-items:center;">
                <select class="form-select" name="slot" style="min-width:12rem;">
                  {{$current := .Current}}
                  {{range $.AllSlots}}
                  <option value="{{.}}" {{if eq . $current}}selected{{end}}>{{.}}</option>
                  {{end}}
                </select>
                <button class="btn btn--small btn--primary" type="submit">Set</button>
              </form>
              {{with .ModelID}}<span class="model-id" style="margin-left:0.5rem;color:var(--text-secondary);">→ {{.}}</span>{{end}}
              {{if .HasPreset}}
              <button class="btn btn--ghost btn--small suggest-btn"
                      hx-get="/models?preset={{.Name}}"
                      hx-target="#models-content"
                      hx-swap="outerHTML"
                      title="Filter model catalog for this role">
                ✨ Suggest
              </button>
              {{end}}
            </td>
          </tr>
          {{end}}
        </tbody>
      </table>
    </div>
  </div>
</div>
{{end}}
