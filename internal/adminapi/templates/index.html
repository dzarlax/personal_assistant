{{define "index"}}<!DOCTYPE html>
<html lang="en">
<head>
  <title>Admin — Personal Assistant</title>
  {{template "admin_head" .}}
</head>
<body>
  <h1>Personal Assistant · Admin</h1>
  {{template "admin_tabs" .}}

  <section class="admin-section" id="routing-section">
    {{template "routing_section" .Routing}}
  </section>

  <section class="admin-section" id="models-section">
    <div class="card">
      <div class="card__header" style="display:flex;justify-content:space-between;align-items:center;">
        <strong>OpenRouter models</strong>
        <button class="btn btn--ghost btn--small"
                hx-post="/refresh"
                hx-target="#models-content"
                hx-swap="outerHTML"
                hx-indicator="#refresh-spinner">
          Refresh catalog
          <span id="refresh-spinner" class="htmx-indicator">…</span>
        </button>
      </div>
      <div class="card__body">
        {{template "models_browser" .}}
      </div>
    </div>
  </section>
</body>
</html>{{end}}
