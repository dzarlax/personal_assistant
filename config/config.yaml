telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  allowed_chat_ids:
    - ${TELEGRAM_OWNER_CHAT_ID}
  owner_chat_id: ${TELEGRAM_OWNER_CHAT_ID}

# Each entry's KEY is its routing name (referenced from `routing.*` below).
# Each entry's `provider` field selects the backend implementation.
# Known providers: openrouter, gemini, ollama, claude-bridge, local, hf-tei, openai.
# The key "embedding" is reserved for the MCP embedding provider.
models:
  # --- OpenRouter — one API key, many models. Add as many entries as you need. ---
  workhorse:
    provider: openrouter
    model: ${OPENROUTER_MODEL:-deepseek/deepseek-chat-v3.1}
    api_key: ${OPENROUTER_API_KEY}
    max_tokens: 4096
    base_url: https://openrouter.ai/api/v1
    vision: true

  # Example: dedicate a separate OpenRouter model to a routing role.
  # reasoner-or:
  #   provider: openrouter
  #   model: anthropic/claude-sonnet-4.5
  #   api_key: ${OPENROUTER_API_KEY}
  #   max_tokens: 8192
  #   base_url: https://openrouter.ai/api/v1
  # cheap-or:
  #   provider: openrouter
  #   model: google/gemini-2.5-flash-lite
  #   api_key: ${OPENROUTER_API_KEY}
  #   max_tokens: 2048
  #   base_url: https://openrouter.ai/api/v1

  # --- Gemini (direct Google API) — fallback + multimodal/transcription. ---
  gemini-flash-lite:
    provider: gemini
    model: gemini-3.1-flash-lite-preview
    api_key: ${GEMINI_API_KEY}
    max_tokens: 2048
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  gemini-flash:
    provider: gemini
    model: gemini-3-flash-preview
    api_key: ${GEMINI_API_KEY}
    max_tokens: 4096
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/

  # --- MCP embedding (hf-tei self-hosted). ---
  embedding:
    provider: hf-tei
    base_url: https://embed.dzarlax.dev   # or http://embed-service:8080 in Docker
    api_key: ${EMBED_API_KEY}             # format: "user:password" for Basic Auth

  # --- Local Ollama — cheap fast classifier on host GPU. ---
  classifier:
    provider: ollama
    model: qwen3:0.6b
    base_url: http://host.docker.internal:11434
    max_tokens: 64
    no_think: true

  # --- Claude via host-side bridge (wraps `claude -p` CLI). ---
  claude-bridge:
    provider: claude-bridge
    base_url: http://host.docker.internal:9900
    api_key: ${CLAUDE_BRIDGE_TOKEN}
    max_tokens: 120

routing:
  local: workhorse             # level 1: simple tasks
  default: workhorse           # level 2: moderate tasks (agentic loop)
  reasoner: claude-bridge      # level 3: complex reasoning via Claude bridge
  fallback: gemini-flash-lite
  multimodal: gemini-flash     # vision/audio — also used for voice transcription
  compaction_model: workhorse
  classifier: classifier       # rates complexity 1/2/3
  classifier_timeout: 15       # seconds
  classifier_min_length: 0     # 0 = always classify; >0 = min chars; <0 = disabled

tool_filter:
  top_k: 20

# Web search — gives LLM access to real-time web results.
# provider: "tavily" (free 1000/mo, LLM-ready answer+sources) or "ollama" (Ollama Cloud).
# Get Tavily key at app.tavily.com (no card required for free tier).
web_search:
  enabled: true
  provider: tavily
  api_key: ${TAVILY_API_KEY}

# Web fetch — extract main article text from a URL.
# Primary: HTTP GET + go-readability (no cost, no API key).
# Fallback: headless Chrome via CDP (for JS-heavy / bot-protected sites).
# Leave cdp_url empty to disable fallback.
web_fetch:
  enabled: true
  cdp_url: ${WEB_FETCH_CDP_URL:-}

# Filesystem access — gives the assistant read/write access to a local directory.
# Mount the directory into the container via volumes in docker-compose.yml.
filesystem:
  enabled: true
  root: /assistant_context

# Text-to-speech via Edge TTS — replies to voice messages with voice.
tts:
  enabled: true
  voice: ru-RU-DmitryNeural  # also: en-US-EmmaMultilingualNeural, uk-UA-OstapNeural

# Voice HTTP API — for Atom Echo and other voice clients.
voice_api:
  enabled: true
  listen: ":8086"
  token: ${VOICE_API_TOKEN}
  chat_id: 9999
