telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  allowed_chat_ids:
    - ${TELEGRAM_OWNER_CHAT_ID}
  owner_chat_id: ${TELEGRAM_OWNER_CHAT_ID}

models:
  deepseek:
    provider: deepseek
    model: deepseek-chat
    api_key: ${DEEPSEEK_API_KEY}
    max_tokens: 4096
    base_url: https://api.deepseek.com
  deepseek-r1:
    provider: deepseek
    model: deepseek-reasoner
    api_key: ${DEEPSEEK_API_KEY}
    max_tokens: 8192
    base_url: https://api.deepseek.com
  gemini-flash-lite:
    provider: gemini
    model: gemini-3.1-flash-lite-preview
    api_key: ${GEMINI_API_KEY}
    max_tokens: 2048
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  gemini-flash:
    provider: gemini
    model: gemini-3-flash-preview
    api_key: ${GEMINI_API_KEY}
    max_tokens: 4096
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  # Embedding model for MCP vector tool filtering (tool_filter.top_k must be > 0).
  # Three providers are supported — uncomment the one you want to use.
  #
  # Option 1: Gemini (default)
  # embedding:
  #   provider: gemini
  #   model: gemini-embedding-001
  #   api_key: ${GEMINI_API_KEY}
  #
  # Option 2: HuggingFace Text Embeddings Inference (e.g. personal-memory server)
  embedding:
    provider: hf-tei
    base_url: https://embed.dzarlax.dev   # or http://embed-service:8080 in Docker
    api_key: ${EMBED_API_KEY}                # optional; format: "user:password" for Basic Auth
  #
  # Option 3: OpenAI-compatible endpoint
  # embedding:
  #   provider: openai
  #   base_url: https://api.openai.com
  #   model: text-embedding-3-small
  #   api_key: ${OPENAI_API_KEY}
  qwen-flash:
    provider: qwen
    model: qwen3.5-flash
    api_key: ${QWEN_API_KEY}
    max_tokens: 4096
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
  qwen3.5-plus:
    provider: qwen
    model: qwen3.5-122b-a10b
    api_key: ${QWEN_API_KEY}
    max_tokens: 4096
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
  qwen-max:
    provider: qwen
    model: qwen3-max
    api_key: ${QWEN_API_KEY}
    max_tokens: 8192
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1

routing:
  default: deepseek
  fallback: gemini-flash-lite
  multimodal: gemini-flash
  reasoner: deepseek-r1
  compaction_model: deepseek
  classifier: qwen-flash
  classifier_min_length: 100

tool_filter:
  top_k: 20
